site_name: Terraform Core Workflow
site_description: A one-page reference for the core Terraform CLI workflow.
site_author: Jacob Ferguson
site_url: https://jfergitlife.github.io/terraform-learning-log/
repo_name: jfergITLife/terraform-learning-log
repo_url: https://github.com/jfergITLife/terraform-learning-log
edit_uri: edit/main/docs/
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  icon:
    repo: fontawesome/brands/github
extra_css:
  - stylesheets/extra.css
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jfergITLife
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/jfergitlife
  generator: false
copyright: Built in public by Jacob Ferguson &middot; <a href="https://github.com/jfergITLife/terraform-learning-log">Source on GitHub</a>
